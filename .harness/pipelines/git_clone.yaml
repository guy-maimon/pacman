pipeline:
  name: Build and Push Pacman
  identifier: git_clone
  projectIdentifier: guym_tf_project_1
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github
        repoName: pacman
        build:
          type: branch
          spec:
            branch: master
  stages:
    - stage:
        name: Build and Push
        identifier: BuildAndPush
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: kubernetes
              namespace: harness-delegate-ng-project
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Snyk Open Source
                  identifier: Snyk_Open_Source
                  spec:
                    connectorRef: account.docker_registry
                    image: snyk/snyk-cli:docker
                    shell: Bash
                    command: |-
                      snyk auth "$SNYK_TOKEN"
                      snyk test --all-projects --severity-threshold=high
                    envVariables:
                      SNYK_TOKEN: <+secrets.getValue("snyk_api_token")>
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: 1000m
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_and_Push
                  spec:
                    connectorRef: account.docker_registry
                    repo: guyma6/pacman
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: docker/Dockerfile
                    context: .
              - step:
                  type: Run
                  name: Snyk Container
                  identifier: Snyk_Container
                  spec:
                    connectorRef: account.docker_registry
                    image: snyk/snyk-cli:docker
                    shell: Bash
                    command: |-
                      snyk auth "$SNYK_TOKEN"
                      snyk container test guyma6/pacman:latest --file=docker/Dockerfile
                    envVariables:
                      SNYK_TOKEN: <+secrets.getValue("snyk_api_token")>
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: 1000m
                  when:
                    stageStatus: Success
