pipeline:
  name: Build Push and Deploy Pacman
  identifier: git_clone
  projectIdentifier: guym_tf_project_1
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github
        repoName: pacman
        build:
          type: branch
          spec:
            branch: master
  stages:
    - stage:
        name: Build and Push
        identifier: BuildAndPush
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: kubernetes
              namespace: harness-delegate-ng-project
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Snyk Open Source
                  identifier: Snyk_Open_Source
                  spec:
                    connectorRef: account.docker_registry
                    image: snyk/snyk-cli:docker
                    shell: Bash
                    command: |-
                      set -euo pipefail
                      if [ -z "${SNYK_TOKEN:-}" ]; then
                        echo "ERROR: SNYK_TOKEN is empty. Set project secret snyk_api_token in Harness."
                        exit 1
                      fi
                      snyk auth "$SNYK_TOKEN"
                      snyk test --all-projects --severity-threshold=high
                    envVariables:
                      SNYK_TOKEN: <+secrets.getValue("snyk_api_token")>
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: 1000m
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_and_Push
                  spec:
                    connectorRef: account.docker_registry
                    repo: guyma6/pacman
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: docker/Dockerfile
                    context: .
              - step:
                  type: Run
                  name: Snyk Container
                  identifier: Snyk_Container
                  spec:
                    connectorRef: account.docker_registry
                    image: snyk/snyk-cli:docker
                    shell: Bash
                    command: |-
                      set -euo pipefail
                      if [ -z "${SNYK_TOKEN:-}" ]; then
                        echo "ERROR: SNYK_TOKEN is empty. Set project secret snyk_api_token in Harness."
                        exit 1
                      fi
                      snyk auth "$SNYK_TOKEN"
                      snyk container test guyma6/pacman:latest --file=docker/Dockerfile
                    envVariables:
                      SNYK_TOKEN: <+secrets.getValue("snyk_api_token")>
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: 1000m
                  when:
                    stageStatus: Success
    - stage:
        name: Deploy to Kubernetes
        identifier: DeployToKubernetes
        type: CI
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: kubernetes
              namespace: harness-delegate-ng-project
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Deploy Pacman
                  identifier: Deploy_Pacman
                  spec:
                    connectorRef: account.docker_registry
                    image: bitnami/kubectl:1.32
                    shell: Bash
                    command: |-
                      set -euo pipefail
                      export KUBECONFIG="${HARNESS_KUBE_CONFIG_PATH}"
                      IMAGE="guyma6/pacman:<+pipeline.sequenceId>"

                      kubectl create namespace pacman --dry-run=client -o yaml | kubectl apply -f -
                      kubectl create deployment pacman --image="${IMAGE}" --port=8080 -n pacman --dry-run=client -o yaml | kubectl apply -f -
                      kubectl set image deployment/pacman pacman="${IMAGE}" -n pacman
                      kubectl expose deployment pacman --name=pacman --port=8080 --target-port=8080 -n pacman --dry-run=client -o yaml | kubectl apply -f -
                      kubectl rollout status deployment/pacman -n pacman --timeout=300s
                      kubectl get all -n pacman
                    resources:
                      limits:
                        memory: 512Mi
                        cpu: 500m
