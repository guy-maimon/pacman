pipeline:
  name: Git Clone Pipeline
  identifier: git_clone
  projectIdentifier: guym_tf_project_1
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github
        repoName: pacman
        build:
          type: branch
          spec:
            branch: master
  stages:
    - stage:
        name: Clone and Run
        identifier: CloneAndRun
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: kubernetes
              namespace: harness-delegate-ng-project
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: List Repository
                  identifier: List_Repository
                  spec:
                    connectorRef: account.docker_registry
                    image: alpine:3
                    shell: Bash
                    command: |-
                      echo "Cloned pacman @ master"
                      ls -la
                      if [ -f README.md ]; then head -20 README.md; fi
