pipeline:
  name: Build Push and Deploy Pacman
  identifier: git_clone
  projectIdentifier: guym_tf_project_1
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github
        repoName: pacman
        build:
          type: branch
          spec:
            branch: master
  stages:
    - stage:
        name: Build and Push
        identifier: BuildAndPush
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: kubernetes
              namespace: harness-delegate-ng-project
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Snyk Open Source
                  identifier: Snyk_Open_Source
                  spec:
                    connectorRef: account.docker_registry
                    image: snyk/snyk-cli:docker
                    shell: Bash
                    command: |-
                      set -euo pipefail
                      if [ -z "${SNYK_TOKEN:-}" ]; then
                        echo "ERROR: SNYK_TOKEN is empty. Set project secret snyk_api_token in Harness."
                        exit 1
                      fi
                      export SNYK_TOKEN
                      snyk test --all-projects --severity-threshold=high
                    envVariables:
                      SNYK_TOKEN: <+secrets.getValue("snyk_api_token")>
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: 1000m
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Build and Push
                  identifier: Build_and_Push
                  spec:
                    connectorRef: account.docker_registry
                    repo: guyma6/pacman
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: docker/Dockerfile
                    context: .
              - step:
                  type: Run
                  name: Snyk Container
                  identifier: Snyk_Container
                  spec:
                    connectorRef: account.docker_registry
                    image: snyk/snyk-cli:docker
                    shell: Bash
                    command: |-
                      set -euo pipefail
                      if [ -z "${SNYK_TOKEN:-}" ]; then
                        echo "ERROR: SNYK_TOKEN is empty. Set project secret snyk_api_token in Harness."
                        exit 1
                      fi
                      export SNYK_TOKEN
                      snyk container test guyma6/pacman:latest --file=docker/Dockerfile
                    envVariables:
                      SNYK_TOKEN: <+secrets.getValue("snyk_api_token")>
                    resources:
                      limits:
                        memory: 1Gi
                        cpu: 1000m
                  when:
                    stageStatus: Success
    - stage:
        name: Deploy to Kubernetes
        identifier: DeployToKubernetes
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: pacman
            serviceInputs:
              serviceDefinition:
                type: Kubernetes
                spec:
                  artifacts:
                    primary:
                      primaryArtifactRef: pacman_image
                      sources:
                        - identifier: pacman_image
                          type: DockerRegistry
                          spec:
                            connectorRef: account.docker_registry
                            imagePath: guyma6/pacman
                            tag: <+pipeline.sequenceId>
          environment:
            environmentRef: pacman
            deployToAll: false
            infrastructureDefinitions:
              - identifier: pacman_k8s
          execution:
            steps:
              - step:
                  type: K8sApply
                  name: Apply Namespace
                  identifier: Apply_Namespace
                  timeout: 10m
                  spec:
                    filePaths:
                      - templates/namespace.yaml
                    skipDryRun: false
                    skipSteadyStateCheck: true
              - step:
                  type: K8sRollingDeploy
                  name: Rollout Deployment
                  identifier: rolloutDeployment
                  timeout: 10m
                  spec:
                    skipDryRun: false
                    pruningEnabled: false
            rollbackSteps:
              - step:
                  type: K8sRollingRollback
                  name: Rolling Rollback
                  identifier: rollingRollback
                  timeout: 10m
                  spec:
                    pruningEnabled: false
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
